syntax = "proto3";

// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
// buf:lint:ignore PACKAGE_VERSION_SUFFIX
package common;

import "buf/validate/validate.proto";
import "google/protobuf/any.proto";
import "google/protobuf/timestamp.proto";

option go_package = "github.com/DrReMain/cyber-ecosystem/gen/go/common;common";

message ErrorBody {
  string reason = 1;
  string message = 2;
  repeated google.protobuf.Any details = 3;
  repeated ErrorBody errors = 4;
}

message ResponseBody {
  bool success = 1;
  google.protobuf.Any result = 2;
  ErrorBody err = 3;
}

message PageRequest {
  optional int32 page_no = 1 [(buf.validate.field).int32 = {gt: 0}];
  optional int32 page_size = 2 [(buf.validate.field).int32 = {
    gt: 0
    lte: 100
  }];
  optional bool all = 3;
  google.protobuf.Timestamp created_at_a = 4;
  google.protobuf.Timestamp created_at_z = 5;
  google.protobuf.Timestamp updated_at_a = 6;
  google.protobuf.Timestamp updated_at_z = 7;
}

message PageResponse {
  int32 page_no = 1;
  int32 page_size = 2;
  int32 total = 3;
  bool more = 4;
}
