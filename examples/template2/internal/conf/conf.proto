syntax = "proto3";
package kratos.api;

import "google/protobuf/duration.proto";

option go_package = "github.com/DrReMain/cyber-ecosystem/examples/template2/internal/conf;conf";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Trace trace = 3;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string host = 2;
    int32 port = 3;
    string user = 4;
    string password = 5;
    string db_name = 6;
    int32 max_open_conns = 7;
    int32 max_idle_conns = 8;
    google.protobuf.Duration conn_max_lifetime = 9;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
  }
  message GRPC {
    string addr = 1;
    google.protobuf.Duration timeout = 2;
  }
  Database database = 1;
  Redis redis = 2;
  GRPC service_template1 = 3;
}

message Trace {
  string endpoint = 1;
}
