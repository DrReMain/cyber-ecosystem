syntax = "proto3";

package api.common;

import "buf/validate/validate.proto";

option go_package = "github.com/DrReMain/cyber-ecosystem/kratos/system-service/gen/common;common";

message PageRequest {
  optional int32 page_no = 1 [(buf.validate.field).int32 = {gt: 0}];
  optional int32 page_size = 2 [(buf.validate.field).int32 = {
    gt: 0
    lte: 100
  }];
  optional int64 created_at_a = 3 [(buf.validate.field).int64 = {gt: 0}];
  optional int64 created_at_z = 4 [(buf.validate.field).int64 = {gt: 0}];
  optional int64 updated_at_a = 5 [(buf.validate.field).int64 = {gt: 0}];
  optional int64 updated_at_z = 6 [(buf.validate.field).int64 = {gt: 0}];
}

message PageResponse {
  int32 page_no = 1;
  int32 page_size = 2;
  int64 total = 3;
  bool more = 4;
}
