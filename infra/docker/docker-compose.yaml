services:
  # ==================== PostgreSQL ====================
  postgres:
    image: postgres:18.3-trixie
    container_name: cyber-ecosystem-postgres
    restart: unless-stopped
    command:
      ["postgres", "-c", "max_connections=500", "-c", "shared_buffers=128MB"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyber-ecosystem-network

  # ==================== Redis ====================
  redis:
    image: redis:8
    container_name: cyber-ecosystem-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyber-ecosystem-network

  # ==================== Jaeger ====================
  jaeger:
    image: jaegertracing/all-in-one:1.76.0
    container_name: cyber-ecosystem-jaeger
    restart: unless-stopped
    environment:
      # Collector
      COLLECTOR_ZIPKIN_HOST_PORT: :9411
      COLLECTOR_OTLP_ENABLED: "true"
      COLLECTOR_OTLP_HTTP_PROTOBUF_ENABLED: "true"
      # prod -> Elasticsearch or Cassandra
      SPAN_STORAGE_TYPE: memory
      LOG_LEVEL: info
    ports:
      # UI
      - "16686:16686"
      # Collector - HTTP
      - "14268:14268"
      # Collector - gRPC
      - "14250:14250"
      # OTLP gRPC
      - "4317:4317"
      # OTLP HTTP
      - "4318:4318"
      # Zipkin compatibility port
      - "9411:9411"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyber-ecosystem-network

  # ==================== Prometheus ====================
  prometheus:
    image: prom/prometheus:v3.10.0
    container_name: cyber-ecosystem-prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/apps:/etc/prometheus/apps:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyber-ecosystem-network

  # ==================== Loki ====================
  loki:
    image: grafana/loki:3.7
    container_name: cyber-ecosystem-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3100:3100"
    volumes:
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cyber-ecosystem-network

  # ==================== Grafana ====================
  grafana:
    image: grafana/grafana:12.4.2
    container_name: cyber-ecosystem-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      test:
        ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - prometheus
      - loki
    networks:
      - cyber-ecosystem-network

  # ==================== MinIO ====================
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: cyber-ecosystem-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      # API port
      - "9000:9000"
      # Console port
      - "9001:9001"
    volumes:
      - minio_data:/data
      - ./minio-entrypoint.sh:/minio-entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/minio-entrypoint.sh"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - cyber-ecosystem-network

  # ==================== tusd ====================
  tusd:
    image: tusproject/tusd:v2.9.2
    container_name: cyber-ecosystem-tusd
    restart: unless-stopped
    environment:
      # MinIO S3 compatible storage
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_REGION: us-east-1
    ports:
      - "8080:8080"
    command: >
      -s3-endpoint http://minio:9000
      -s3-bucket uploads
      -s3-object-prefix files/
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/files"]
      interval: 10s
      timeout: 5s
      retries: 5
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - cyber-ecosystem-network

networks:
  cyber-ecosystem-network:
    driver: bridge
    name: cyber-ecosystem-network

volumes:
  postgres_data:
    name: cyber-ecosystem-postgres-data
  redis_data:
    name: cyber-ecosystem-redis-data
  prometheus_data:
    name: cyber-ecosystem-prometheus-data
  grafana_data:
    name: cyber-ecosystem-grafana-data
  loki_data:
    name: cyber-ecosystem-loki-data
  minio_data:
    name: cyber-ecosystem-minio-data
