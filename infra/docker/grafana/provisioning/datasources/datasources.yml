apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: "prometheus"
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST
      prometheusType: Prometheus
      manageAlerts: true

  - name: Loki
    type: loki
    uid: "loki"
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      maxLines: 1000
      derivedFields:
        - name: TraceID
          matcherRegex: '"trace\.id":"([a-f0-9]+)"'
          url: '$${__value.raw}'
          datasourceUid: "jaeger"
          urlDisplayLabel: "View Trace"

  - name: Jaeger
    type: jaeger
    uid: "jaeger"
    access: proxy
    url: http://jaeger:16686
    editable: false
    jsonData:
      nodeGraph:
        enabled: true
