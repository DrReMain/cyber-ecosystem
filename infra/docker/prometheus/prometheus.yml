global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "cyber-ecosystem"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          instance: "prometheus"

  - job_name: "app_1_service_1"
    static_configs:
      - targets: ["host.docker.internal:14000"]
        labels:
          service: 'app_1_service_1'
    metrics_path: /metrics
