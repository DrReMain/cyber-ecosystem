global:
  scrape_interval: 15s     # 默认抓取间隔
  evaluation_interval: 15s # 规则评估间隔
  external_labels:
    monitor: 'cyber-ecosystem'

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  - job_name: 'examples-template1'
    static_configs:
      - targets: ['host.docker.internal:11000']
        labels:
          service: 'examples-template1'
    metrics_path: /metrics

  - job_name: 'examples-template2'
    static_configs:
      - targets: ['host.docker.internal:11001']
        labels:
          service: 'examples-template2'
    metrics_path: /metrics
