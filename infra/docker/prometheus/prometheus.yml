global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: "cyber-ecosystem"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          instance: "prometheus"

  - job_name: "services"
    metrics_path: /metrics
    file_sd_configs:
      - files:
          - /etc/prometheus/apps/*.yaml
        refresh_interval: 30s
