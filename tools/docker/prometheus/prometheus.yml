# Prometheus 配置文件
# 用于监控 Cyber Ecosystem 服务

global:
  scrape_interval: 15s     # 默认抓取间隔
  evaluation_interval: 15s # 规则评估间隔
  external_labels:
    monitor: 'cyber-ecosystem'

# Alertmanager 配置（可选）
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - alertmanager:9093

# 抓取配置
scrape_configs:
  # Prometheus 自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          instance: 'prometheus'

  # Go 应用服务监控（template1）
  # 取消注释以启用，并确保应用暴露 /metrics 端点
  # - job_name: 'template1'
  #   static_configs:
  #     - targets: ['host.docker.internal:9001']
  #       labels:
  #         service: 'template1'
  #   metrics_path: /metrics

  # Go 应用服务监控（template2）
  # 取消注释以启用
  # - job_name: 'template2'
  #   static_configs:
  #     - targets: ['host.docker.internal:9002']
  #       labels:
  #         service: 'template2'
  #   metrics_path: /metrics

  # PostgreSQL Exporter（需要单独部署 postgres_exporter）
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres_exporter:9187']

  # Redis Exporter（需要单独部署 redis_exporter）
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis_exporter:9121']

  # Node Exporter（系统指标，可选）
  # - job_name: 'node'
  #   static_configs:
  #     - targets: ['node_exporter:9100']
