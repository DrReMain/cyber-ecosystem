syntax = "proto3";

// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
package api.genesis.v1;

import "buf/validate/validate.proto";
import "desc/desc.proto";
import "google/api/annotations.proto";

option go_package = "cyber-ecosystem/apps/genesis/gen/go/v1;genesisV1";

// region[rgba(239,83,80,0.15)] 🔴 Model

message Method {
  string name = 1;
  string full_name = 2;
  string request_name = 3;
  string request_full_name = 4;
  string response_name = 5;
  string response_full_name = 6;
  string http_method = 7;
  string http_path = 8;
  string comment = 9;
}

message Service {
  string name = 1;
  string full_name = 2;
  string package = 3;
  string source_file = 4;
  string comment = 5;
  repeated Method methods = 6;
}

// region[rgba(186,104,200,0.15)] 🟣 Messages

message ListResourceRequest {}

message ListResourceResponse {
  repeated Service list = 1;
}
