syntax = "proto3";

// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
package api.app_1.v1;

import "auth/auth.proto";
import "buf/validate/validate.proto";
import "common/page.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "cyber-ecosystem/apps/app_1/gen/go/v1;app1V1";

// BlogService
service BlogService {
  // CreateBlog
  rpc CreateBlog(CreateBlogRequest) returns (CreateBlogResponse) {
    option (google.api.http) = {
      post: "/api/v1/blog"
      body: "*"
    };
  }
  // UpdateBlog
  rpc UpdateBlog(UpdateBlogRequest) returns (UpdateBlogResponse) {
    option (google.api.http) = {
      put: "/api/v1/blog/{id}"
      body: "*"
    };
  }
  // DeleteBlog
  rpc DeleteBlog(DeleteBlogRequest) returns (DeleteBlogResponse) {
    option (google.api.http) = {delete: "/api/v1/blog/{id}"};
  }
  // DeleteBatchBlog
  rpc DeleteBatchBlog(DeleteBatchBlogRequest) returns (DeleteBatchBlogResponse) {
    option (google.api.http) = {
      post: "/api/v1/blog/delete-batch"
      body: "*"
    };
  }
  // GetBlog
  rpc GetBlog(GetBlogRequest) returns (GetBlogResponse) {
    option (google.api.http) = {get: "/api/v1/blog/{id}"};
  }
  // QueryBlog
  rpc QueryBlog(QueryBlogRequest) returns (QueryBlogResponse) {
    option (auth.public_access) = true;
    option (google.api.http) = {get: "/api/v1/blog"};
  }
}

message CreateBlogRequest {
  optional string title = 1 [(buf.validate.field).string = {
    min_len: 2
    max_len: 50
  }];
  optional string content = 2;
  google.protobuf.Timestamp published_at = 3;
}
message CreateBlogResponse {}

message UpdateBlogRequest {
  string id = 1 [(buf.validate.field).string.len = 20];
  optional string title = 2 [(buf.validate.field).string = {
    min_len: 2
    max_len: 50
  }];
  optional string content = 3;
  google.protobuf.Timestamp published_at = 4;

  repeated string fields_mask = 100 [(buf.validate.field).repeated = {
    min_items: 1
    unique: true
  }];
}
message UpdateBlogResponse {}

message DeleteBlogRequest {
  string id = 1 [(buf.validate.field).string.len = 20];
}
message DeleteBlogResponse {}

message DeleteBatchBlogRequest {
  repeated string ids = 1 [(buf.validate.field).repeated = {
    min_items: 1
    unique: true
  }];
}
message DeleteBatchBlogResponse {
  int32 count = 1;
}

message GetBlogRequest {
  string id = 1 [(buf.validate.field).string.len = 20];
}
message GetBlogResponse {
  string id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
  google.protobuf.StringValue title = 4;
  google.protobuf.StringValue content = 5;
  google.protobuf.Timestamp published_at = 6;
}

message QueryBlogRequest {
  common.PageRequest page = 1;
  optional string id = 2 [(buf.validate.field).string.len = 20];
  optional string title = 3;
  google.protobuf.Timestamp published_at_a = 4;
  google.protobuf.Timestamp published_at_z = 5;

  repeated string order_by = 100 [(buf.validate.field).cel = {
    id: "QueryBlogRequest.order_by"
    message: "validate fail"
    expression: "this.all(item, size(item) == 0 || item.matches('^(createdAt|updatedAt):(asc|desc)$'))"
  }];
}
message QueryBlogResponse {
  common.PageResponse page = 1;
  repeated GetBlogResponse list = 2;
}
