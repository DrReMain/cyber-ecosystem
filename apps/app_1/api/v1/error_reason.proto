syntax = "proto3";

// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
package api.app_1.v1;

import "errors/errors.proto";

option go_package = "cyber-ecosystem/apps/app_1/gen/go/v1;app1V1";

// =============================================================================
// i18n Translation Rules (geni18n tool)
// =============================================================================
// The geni18n tool (shared-go/kratos/middleware/i18n/cmd/geni18n) scans this file
// to generate translation YAML files. To work correctly, you MUST follow these rules:
//
// 1. ENUM NAME
//    - The enum MUST be named exactly "ErrorReason".
//      Regex used: `enum\s+ErrorReason\s*\{`
//
// 2. ENUM VALUE NAMING
//    - All enum values MUST follow the pattern: ERROR_REASON_<NAME>
//      Regex used: `ERROR_REASON_\w+\s*=\s*\d+`
//    - Examples:
//        ERROR_REASON_UNSPECIFIED    = 0;
//        ERROR_REASON_ENT_NOT_FOUND  = 1;
//        ERROR_REASON_VALIDATOR      = 6;
//
// 3. SERVICE NAME
//    - The generated YAML filename is derived from the enum's proto file directory.
//      e.g., if the proto file is at "api/v1/error_reason.proto", the generated
//      files will be: v1.en-US.yaml, v1.zh-CN.yaml, etc.
//
// 4. REGENERATION BEHAVIOR
//    - Run: go run geni18n <proto_path> <output_dir> -locale=en-US,zh-CN,ja-JP
//    - Existing translations are preserved (not overwritten) on regeneration.
//    - Orphan keys (removed enum values) are automatically cleaned up.
//
// =============================================================================

enum ErrorReason {
  option (errors.default_code) = 500;

  ERROR_REASON_UNSPECIFIED = 0 [(errors.code) = 500];

  ERROR_REASON_ENT_NOT_FOUND = 1 [(errors.code) = 404];
  ERROR_REASON_ENT_VALIDATION = 2 [(errors.code) = 400];
  ERROR_REASON_ENT_NOT_SINGULAR = 3 [(errors.code) = 400];
  ERROR_REASON_ENT_NOT_LOADED = 4 [(errors.code) = 500];
  ERROR_REASON_ENT_CONSTRAINT = 5 [(errors.code) = 409];

  ERROR_REASON_UNAUTHORIZED = 6 [(errors.code) = 401];

  ERROR_REASON_VALIDATOR = 7 [(errors.code) = 400];
  ERROR_REASON_PAGINATION_INVALID_ARGUMENT = 8 [(errors.code) = 400];
}
