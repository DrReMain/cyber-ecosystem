syntax = "proto3";

// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
package api.app_1.v1;

import "auth/auth.proto";
import "buf/validate/validate.proto";
import "common/page.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "cyber-ecosystem/apps/app_1/gen/go/v1;app1V1";

// ReadingService
service ReadingService {
  // QueryBlogReading
  rpc QueryBlogReading(QueryBlogReadingRequest) returns (QueryBlogReadingResponse) {
    option (auth.public_access) = true;
    option (google.api.http) = {get: "/api/v1/reading/blog"};
  }
  // GetBlogReading
  rpc GetBlogReading(GetBlogReadingRequest) returns (GetBlogReadingResponse) {
    option (google.api.http) = {get: "/api/v1/reading/blog/{id}"};
  }
  // RecordReading
  rpc RecordReading(RecordReadingRequest) returns (RecordReadingResponse) {
    option (google.api.http) = {
      post: "/api/v1/reading/blog/{id}/read"
      body: "*"
    };
  }
}

message QueryBlogReadingRequest {
  common.PageRequest page = 1;
  optional string id = 2 [(buf.validate.field).string.len = 20];
  optional string title = 3;
  google.protobuf.Timestamp published_at_a = 4;
  google.protobuf.Timestamp published_at_z = 5;

  repeated string order_by = 100 [(buf.validate.field).cel = {
    id: "QueryBlogReadingRequest.order_by"
    message: "validate fail"
    expression: "this.all(item, size(item) == 0 || item.matches('^(createdAt|updatedAt):(asc|desc)$'))"
  }];
}

message QueryBlogReadingResponse {
  common.PageResponse page = 1;
  repeated BlogWithReading list = 2;
}

message BlogWithReading {
  string id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
  google.protobuf.StringValue title = 4;
  google.protobuf.StringValue content = 5;
  google.protobuf.Timestamp published_at = 6;
  int64 reading_count = 7;
}

message GetBlogReadingRequest {
  string id = 1 [(buf.validate.field).string.len = 20];
}

message GetBlogReadingResponse {
  string id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
  google.protobuf.StringValue title = 4;
  google.protobuf.StringValue content = 5;
  google.protobuf.Timestamp published_at = 6;
  int64 reading_count = 7;
}

message RecordReadingRequest {
  string id = 1 [(buf.validate.field).string.len = 20];
}

message RecordReadingResponse {
  int64 reading_count = 1;
}
