syntax = "proto3";

// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
package api.app_1.v1;

import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "cyber-ecosystem/apps/app_1/gen/go/v1;app1V1";

// AuthorService
service AuthorService {
  // CreateAuthor
  rpc CreateAuthor(CreateAuthorRequest) returns (CreateAuthorResponse) {
    option (google.api.http) = {
      post: "/api/v1/author"
      body: "*"
    };
  }
  // GetAuthor
  rpc GetAuthor(GetAuthorRequest) returns (GetAuthorResponse) {
    option (google.api.http) = {get: "/api/v1/author/{id}"};
  }
}

message CreateAuthorRequest {
  optional string name = 1 [(buf.validate.field).string = {
    min_len: 2
    max_len: 50
  }];
}
message CreateAuthorResponse {}

message GetAuthorRequest {
  string id = 1 [(buf.validate.field).string.len = 20];
}
message GetAuthorResponse {
  string id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
  google.protobuf.StringValue name = 4;
}
