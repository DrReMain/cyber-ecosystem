syntax = "proto3";
// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
// buf:lint:ignore PACKAGE_VERSION_SUFFIX
package cyber_ecosystem.conf;

import "google/protobuf/duration.proto";

option go_package = "app_1/services/service_2/internal/conf;conf";

message Bootstrap {
  Server server = 1;
  Auth auth = 2;
  Log log = 3;
  Data data = 4;
  Trace trace = 5;
  Ops ops = 6;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message Connect {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
  Connect connect = 3;
}

message Auth {
  string secret = 1;
}

message Log {
  message Cache {
    bool enabled = 1;
    string level = 2;
    bool slow_query = 3;
    google.protobuf.Duration slow_query_threshold = 4;
  }
  message Ent {
    bool enabled = 1;
    string level = 2;
    bool slow_query = 3;
    google.protobuf.Duration slow_query_threshold = 4;
  }
  message Console {
    bool enabled = 1;
    bool color = 2;
    string format = 3; // "console" or "json", default "console"
  }
  message File {
    bool enabled = 1;
    string path = 2;
    int32 max_size = 3; // MB
    int32 max_backups = 4;
    int32 max_age = 5; // days
    bool compress = 6;
  }
  message Loki {
    bool enabled = 1;
    string url = 2;
    map<string, string> labels = 3;
    google.protobuf.Duration batch_wait = 4;
    int32 batch_size = 5; // bytes
  }

  string level = 1;
  Cache cache = 2;
  Ent ent = 3;
  Console console = 4;
  File file = 5;
  Loki loki = 6;
}

message Data {
  message Database {
    string driver = 1;
    string host = 2;
    int32 port = 3;
    string user = 4;
    string password = 5;
    string db_name = 6;
    int32 max_open_conns = 7;
    int32 max_idle_conns = 8;
    google.protobuf.Duration conn_max_lifetime = 9;
    bool migrate = 10;
  }
  message Cache {
    message Memory {
      bool otel_enabled = 1;
    }
    message Redis {
      string network = 1;
      string addr = 2;
      google.protobuf.Duration read_timeout = 3;
      google.protobuf.Duration write_timeout = 4;
      int32 pool_size = 5;
      int32 min_idle_conns = 6;
      google.protobuf.Duration conn_max_lifetime = 7;
      string password = 8;
      int32 db = 9;
      bool otel_enabled = 10;
    }
    string type = 1; // memory / redis
    Memory memory = 2;
    Redis redis = 3;
  }
  message GRPC {
    string addr = 1;
    google.protobuf.Duration timeout = 2;
  }
  message Connect {
    string addr = 1;
    google.protobuf.Duration timeout = 2;
  }
  Database database = 1;
  Cache cache = 2;
  GRPC grpc_service_1 = 3;
  Connect connect_service_1 = 4;
}

message Trace {
  string endpoint = 1;
  bool insecure = 2;
}

message Ops {
  message Pprof {
    bool enabled = 1;
    bool cpu_enabled = 2;
    bool heap_enabled = 3;
    bool goroutine_enabled = 4;
    bool mutex_enabled = 5;
    bool thread_enabled = 6;
    bool trace_enabled = 7;
  }
  bool enabled = 1;
  string network = 2;
  string addr = 3;
  string metrics = 4;
  Pprof pprof = 5;
}
