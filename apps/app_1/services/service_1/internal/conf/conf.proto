syntax = "proto3";
// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
// buf:lint:ignore PACKAGE_VERSION_SUFFIX
package cyber_ecosystem.conf;

import "google/protobuf/duration.proto";

option go_package = "app_1/services/service_1/internal/conf;conf";

message Bootstrap {
  Server server = 1;
  Auth auth = 2;
  Log log = 3;
  Data data = 4;
  Trace trace = 5;
  Ops ops = 6;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message Connect {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
  Connect connect = 3;
}

message Auth {
  string secret = 1;
}

message Log {
  string level = 1;

  message Console {
    bool enabled = 1;
    bool color = 2;
    string format = 3; // "console" or "json", default "console"
  }

  message File {
    bool enabled = 1;
    string path = 2;
    int32 max_size = 3; // MB
    int32 max_backups = 4;
    int32 max_age = 5; // days
    bool compress = 6;
  }

  message Loki {
    bool enabled = 1;
    string url = 2;
    map<string, string> labels = 3;
    google.protobuf.Duration batch_wait = 4;
    int32 batch_size = 5; // bytes
  }

  message Ent {
    bool enabled = 1;
    string level = 2;
    bool slow_query = 3;
    google.protobuf.Duration slow_query_threshold = 4;
  }

  Console console = 2;
  File file = 3;
  Loki loki = 4;
  Ent ent = 5;
}

message Data {
  message Database {
    string driver = 1;
    string host = 2;
    int32 port = 3;
    string user = 4;
    string password = 5;
    string db_name = 6;
    int32 max_open_conns = 7;
    int32 max_idle_conns = 8;
    google.protobuf.Duration conn_max_lifetime = 9;
    bool migrate = 10;
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
  }
  Database database = 1;
  Redis redis = 2;
}

message Trace {
  string endpoint = 1;
}

message Ops {
  message Pprof {
    bool enabled = 1;
    bool cpu_enabled = 2;
    bool heap_enabled = 3;
    bool goroutine_enabled = 4;
    bool mutex_enabled = 5;
    bool thread_enabled = 6;
    bool trace_enabled = 7;
  }
  bool enabled = 1;
  string network = 2;
  string addr = 3;
  string metrics = 4;
  Pprof pprof = 5;
}
