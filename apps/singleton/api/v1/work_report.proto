syntax = "proto3";

// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
package api.singleton.v1;

import "buf/validate/validate.proto";
import "common/page.proto";
import "desc/desc.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "cyber-ecosystem/apps/singleton/gen/go/v1;singletonV1";

// WorkReportService
service WorkReportService {
  option (desc.service_comment) = "工作报告服务";

  // CreateWorkReport
  rpc CreateWorkReport(CreateWorkReportRequest) returns (CreateWorkReportResponse) {
    option (desc.method_comment) = "创建报告";
    option (google.api.http) = {
      post: "/api/v1/work/report"
      body: "*"
    };
  }
  // UpdateWorkReport
  rpc UpdateWorkReport(UpdateWorkReportRequest) returns (UpdateWorkReportResponse) {
    option (desc.method_comment) = "修改报告";
    option (google.api.http) = {
      put: "/api/v1/work/report/{id}"
      body: "*"
    };
  }
  // DeleteWorkReport
  rpc DeleteWorkReport(DeleteWorkReportRequest) returns (DeleteWorkReportResponse) {
    option (desc.method_comment) = "删除报告";
    option (google.api.http) = {delete: "/api/v1/work/report/{id}"};
  }
  // GetWorkReport
  rpc GetWorkReport(GetWorkReportRequest) returns (GetWorkReportResponse) {
    option (desc.method_comment) = "查询报告详情";
    option (google.api.http) = {get: "/api/v1/work/report/{id}"};
  }
  // QueryWorkReport
  rpc QueryWorkReport(QueryWorkReportRequest) returns (QueryWorkReportResponse) {
    option (desc.method_comment) = "查询报告列表";
    option (google.api.http) = {get: "/api/v1/work/report"};
  }
}

message CreateWorkReportRequest {
  optional string title = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];
  optional string content = 2;
  optional string type = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];
  optional string department_id = 4;
  optional int32 access_level = 5;
  optional string region = 6;
}

message CreateWorkReportResponse {
  string id = 1;
}

message UpdateWorkReportRequest {
  string id = 1 [(buf.validate.field).string.len = 20];
  optional string title = 2;
  optional string content = 3;
  optional string type = 4;
  optional int32 access_level = 5;
  optional string region = 6;
  optional string status = 7;
  repeated string fields_mask = 100 [(buf.validate.field).repeated = {
    min_items: 1
    unique: true
  }];
}

message UpdateWorkReportResponse {}

message DeleteWorkReportRequest {
  string id = 1 [(buf.validate.field).string.len = 20];
}

message DeleteWorkReportResponse {}

message GetWorkReportRequest {
  string id = 1 [(buf.validate.field).string.len = 20];
}

message GetWorkReportResponse {
  string id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
  google.protobuf.StringValue title = 4;
  google.protobuf.StringValue content = 5;
  google.protobuf.StringValue type = 6;
  google.protobuf.StringValue department_id = 7;
  google.protobuf.Int32Value access_level = 8;
  google.protobuf.StringValue region = 9;
  google.protobuf.StringValue created_by = 10;
  google.protobuf.StringValue status = 11;
}

message QueryWorkReportRequest {
  common.PageRequest page = 1;
  optional string type = 2;
  optional string status = 3;

  repeated string order_by = 100 [(buf.validate.field).cel = {
    id: "QueryWorkReportRequest.order_by"
    message: ""
    expression: "this.all(item, size(item) == 0 || item.matches('^(created_at|updated_at):(asc|desc)$'))"
  }];
}

message QueryWorkReportResponse {
  common.PageResponse page = 1;
  repeated GetWorkReportResponse list = 2;
}
