syntax = "proto3";

// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
package api.singleton.v1;

import "buf/validate/validate.proto";
import "common/page.proto";
import "desc/desc.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "cyber-ecosystem/apps/singleton/gen/go/v1;singletonV1";

// DepartmentService
service DepartmentService {
  option (desc.service_comment) = "部门管理服务";

  // CreateDepartment
  rpc CreateDepartment(CreateDepartmentRequest) returns (CreateDepartmentResponse) {
    option (desc.method_comment) = "创建部门";
    option (google.api.http) = {
      post: "/api/v1/department"
      body: "*"
    };
  }
  // UpdateDepartment
  rpc UpdateDepartment(UpdateDepartmentRequest) returns (UpdateDepartmentResponse) {
    option (desc.method_comment) = "修改部门";
    option (google.api.http) = {
      put: "/api/v1/department/{id}"
      body: "*"
    };
  }
  // DeleteDepartment
  rpc DeleteDepartment(DeleteDepartmentRequest) returns (DeleteDepartmentResponse) {
    option (desc.method_comment) = "删除部门";
    option (google.api.http) = {delete: "/api/v1/department/{id}"};
  }
  // GetDepartment
  rpc GetDepartment(GetDepartmentRequest) returns (GetDepartmentResponse) {
    option (desc.method_comment) = "查询部门详情";
    option (google.api.http) = {get: "/api/v1/department/{id}"};
  }
  // QueryDepartment
  rpc QueryDepartment(QueryDepartmentRequest) returns (QueryDepartmentResponse) {
    option (desc.method_comment) = "查询部门列表";
    option (google.api.http) = {get: "/api/v1/department"};
  }
  // MoveDepartment
  rpc MoveDepartment(MoveDepartmentRequest) returns (MoveDepartmentResponse) {
    option (desc.method_comment) = "移动部门";
    option (google.api.http) = {
      put: "/api/v1/department/{id}/move"
      body: "*"
    };
  }
}

message CreateDepartmentRequest {
  optional string name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];
  optional string code = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];
  optional string parent_id = 3;
}

message CreateDepartmentResponse {}

message UpdateDepartmentRequest {
  string id = 1 [(buf.validate.field).string.len = 20];
  optional string name = 2;
  optional string code = 3;
  optional uint32 status = 4;
  repeated string fields_mask = 100 [(buf.validate.field).repeated = {
    min_items: 1
    unique: true
  }];
}

message UpdateDepartmentResponse {}

message DeleteDepartmentRequest {
  string id = 1 [(buf.validate.field).string.len = 20];
}

message DeleteDepartmentResponse {}

message GetDepartmentRequest {
  string id = 1 [(buf.validate.field).string.len = 20];
}

message GetDepartmentResponse {
  string id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
  google.protobuf.StringValue name = 4;
  google.protobuf.StringValue code = 5;
  google.protobuf.StringValue parent_id = 6;
  google.protobuf.StringValue path = 7;
  google.protobuf.UInt32Value status = 8;
  string sort = 9;
}

message QueryDepartmentRequest {
  common.PageRequest page = 1;
  optional string name = 2;
  optional string code = 3;
  optional string parent_id = 4;

  repeated string order_by = 100 [(buf.validate.field).cel = {
    id: "QueryDepartmentRequest.order_by"
    message: ""
    expression: "this.all(item, size(item) == 0 || item.matches('^(created_at|updated_at|sort):(asc|desc)$'))"
  }];
}

message QueryDepartmentResponse {
  common.PageResponse page = 1;
  repeated GetDepartmentResponse list = 2;
}

message MoveDepartmentRequest {
  string id = 1 [(buf.validate.field).string.len = 20];
  optional string parent_id = 2;
}

message MoveDepartmentResponse {}
