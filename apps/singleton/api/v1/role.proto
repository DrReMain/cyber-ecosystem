syntax = "proto3";

// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
package api.singleton.v1;

import "buf/validate/validate.proto";
import "common/page.proto";
import "desc/desc.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "cyber-ecosystem/apps/singleton/gen/go/v1;singletonV1";

// RoleService
service RoleService {
  option (desc.service_comment) = "角色管理服务";

  // CreateRole
  rpc CreateRole(CreateRoleRequest) returns (CreateRoleResponse) {
    option (desc.method_comment) = "创建角色";
    option (google.api.http) = {
      post: "/api/v1/role"
      body: "*"
    };
  }
  // UpdateRole
  rpc UpdateRole(UpdateRoleRequest) returns (UpdateRoleResponse) {
    option (desc.method_comment) = "修改角色";
    option (google.api.http) = {
      put: "/api/v1/role/{id}"
      body: "*"
    };
  }
  // DeleteRole
  rpc DeleteRole(DeleteRoleRequest) returns (DeleteRoleResponse) {
    option (desc.method_comment) = "删除角色";
    option (google.api.http) = {delete: "/api/v1/role/{id}"};
  }
  // GetRole
  rpc GetRole(GetRoleRequest) returns (GetRoleResponse) {
    option (desc.method_comment) = "查询角色详情";
    option (google.api.http) = {get: "/api/v1/role/{id}"};
  }
  // QueryRole
  rpc QueryRole(QueryRoleRequest) returns (QueryRoleResponse) {
    option (desc.method_comment) = "查询角色列表";
    option (google.api.http) = {get: "/api/v1/role"};
  }
}

message CreateRoleRequest {
  optional string name = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];
  optional string code = 2 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 1
  ];
  optional string description = 3;
}

message CreateRoleResponse {}

message UpdateRoleRequest {
  string id = 1 [(buf.validate.field).string.len = 20];
  optional string name = 2;
  optional string description = 3;
  optional uint32 status = 4;
  repeated string fields_mask = 100 [(buf.validate.field).repeated = {
    min_items: 1
    unique: true
  }];
}

message UpdateRoleResponse {}

message DeleteRoleRequest {
  string id = 1 [(buf.validate.field).string.len = 20];
}

message DeleteRoleResponse {}

message GetRoleRequest {
  string id = 1 [(buf.validate.field).string.len = 20];
}

message GetRoleResponse {
  string id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
  google.protobuf.StringValue name = 4;
  google.protobuf.StringValue code = 5;
  google.protobuf.StringValue description = 6;
  google.protobuf.UInt32Value status = 7;
  string sort = 8;
}

message QueryRoleRequest {
  common.PageRequest page = 1;
  optional string name = 2;
  optional string code = 3;

  repeated string order_by = 100 [(buf.validate.field).cel = {
    id: "QueryRoleRequest.order_by"
    message: ""
    expression: "this.all(item, size(item) == 0 || item.matches('^(created_at|updated_at|sort):(asc|desc)$'))"
  }];
}

message QueryRoleResponse {
  common.PageResponse page = 1;
  repeated GetRoleResponse list = 2;
}
