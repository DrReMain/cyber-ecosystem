syntax = "proto3";

// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
package api.singleton.v1;

import "desc/desc.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";

option go_package = "cyber-ecosystem/apps/singleton/gen/go/v1;singletonV1";

// AccountDetailService
service AccountDetailService {
  option (desc.service_comment) = "账号详情服务";

  // GetProfile
  rpc GetProfile(GetProfileRequest) returns (GetProfileResponse) {
    option (desc.method_comment) = "获取当前用户信息";
    option (google.api.http) = {get: "/api/v1/account/profile"};
  }
}

message GetProfileRequest {}

message GetProfileResponse {
  string id = 1;
  string email = 4;
}
