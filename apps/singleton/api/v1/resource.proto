syntax = "proto3";

// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
package api.singleton.v1;

import "auth/auth.proto";
import "buf/validate/validate.proto";
import "common/page.proto";
import "desc/desc.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "cyber-ecosystem/apps/singleton/gen/go/v1;singletonV1";

// ResourceService
service ResourceService {
  option (desc.service_comment) = "系统资源服务";

  // ListResource
  rpc ListResource(ListResourceRequest) returns (ListResourceResponse) {
    option (desc.method_comment) = "获取所有rpc信息";
    option (google.api.http) = {get: "/api/v1/resource"};
  }
}

message ListResourceRequest {}

message ListResourceResponse {
  repeated Service list = 1;
}

// ---------------------------------------------------------------------------------------------------------------------

message Method {
  string name = 1;
  string full_name = 2;
  string request_name = 3;
  string request_full_name = 4;
  string response_name = 5;
  string response_full_name = 6;
  string http_method = 7;
  string http_path = 8;
  string comment = 9;
}

message Service {
  string name = 1;
  string full_name = 2;
  string package = 3;
  string source_file = 4;
  string comment = 5;
  repeated Method methods = 6;
}
