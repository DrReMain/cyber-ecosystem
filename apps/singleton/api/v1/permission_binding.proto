syntax = "proto3";

// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
package api.singleton.v1;

import "buf/validate/validate.proto";
import "desc/desc.proto";
import "google/api/annotations.proto";

option go_package = "cyber-ecosystem/apps/singleton/gen/go/v1;singletonV1";

// PermissionBindingService
service PermissionBindingService {
  option (desc.service_comment) = "角色权限绑定服务";

  // CreatePermissionBinding
  rpc CreatePermissionBinding(CreatePermissionBindingRequest) returns (CreatePermissionBindingResponse) {
    option (desc.method_comment) = "为角色分配权限";
    option (google.api.http) = {
      post: "/api/v1/permission-binding"
      body: "*"
    };
  }
  // DeletePermissionBinding
  rpc DeletePermissionBinding(DeletePermissionBindingRequest) returns (DeletePermissionBindingResponse) {
    option (desc.method_comment) = "移除角色权限";
    option (google.api.http) = {
      post: "/api/v1/permission-binding:delete"
      body: "*"
    };
  }
  // ListPermissionBindings
  rpc ListPermissionBindings(ListPermissionBindingsRequest) returns (ListPermissionBindingsResponse) {
    option (desc.method_comment) = "查询角色权限列表";
    option (google.api.http) = {get: "/api/v1/permission-binding"};
  }
}

message CreatePermissionBindingRequest {
  string role_code = 1 [(buf.validate.field).string.min_len = 1];
  string object = 2 [(buf.validate.field).string.min_len = 1];
  optional string effect = 3; // "allow" or "deny", default "allow"
}

message CreatePermissionBindingResponse {}

message DeletePermissionBindingRequest {
  string role_code = 1 [(buf.validate.field).string.min_len = 1];
  string object = 2 [(buf.validate.field).string.min_len = 1];
  optional string effect = 3;
}

message DeletePermissionBindingResponse {}

message ListPermissionBindingsRequest {
  string role_code = 1 [(buf.validate.field).string.min_len = 1];
}

message PermissionBinding {
  string object = 1;
  string effect = 2;
}

message ListPermissionBindingsResponse {
  repeated PermissionBinding list = 1;
}
