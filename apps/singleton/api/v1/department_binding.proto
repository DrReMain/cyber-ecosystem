syntax = "proto3";

// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
package api.singleton.v1;

import "buf/validate/validate.proto";
import "desc/desc.proto";
import "google/api/annotations.proto";
import "singleton/api/v1/department.proto";

option go_package = "cyber-ecosystem/apps/singleton/gen/go/v1;singletonV1";

// DepartmentBindingService
service DepartmentBindingService {
  option (desc.service_comment) = "用户部门绑定服务";

  // SetUserDepartments
  rpc SetUserDepartments(SetUserDepartmentsRequest) returns (SetUserDepartmentsResponse) {
    option (desc.method_comment) = "设置用户所属部门（全量替换）";
    option (google.api.http) = {
      put: "/api/v1/department-binding/{user_id}"
      body: "*"
    };
  }
  // ListUserDepartments
  rpc ListUserDepartments(ListUserDepartmentsRequest) returns (ListUserDepartmentsResponse) {
    option (desc.method_comment) = "查询用户所属部门";
    option (google.api.http) = {get: "/api/v1/department-binding/{user_id}"};
  }
  // ListDepartmentUsers
  rpc ListDepartmentUsers(ListDepartmentUsersRequest) returns (ListDepartmentUsersResponse) {
    option (desc.method_comment) = "查询部门下的用户";
    option (google.api.http) = {get: "/api/v1/department-binding/department/{department_id}"};
  }
}

message SetUserDepartmentsRequest {
  string user_id = 1 [(buf.validate.field).string.len = 20];
  repeated string department_ids = 2 [(buf.validate.field).repeated = {
    min_items: 1
    unique: true
  }];
}

message SetUserDepartmentsResponse {}

message ListUserDepartmentsRequest {
  string user_id = 1 [(buf.validate.field).string.len = 20];
}

message ListUserDepartmentsResponse {
  repeated GetDepartmentResponse list = 1;
}

message ListDepartmentUsersRequest {
  string department_id = 1 [(buf.validate.field).string.len = 20];
}

message ListDepartmentUsersResponse {
  repeated string user_ids = 1;
}
