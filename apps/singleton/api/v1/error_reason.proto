syntax = "proto3";

// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
package api.singleton.v1;

import "errors/errors.proto";

option go_package = "cyber-ecosystem/apps/singleton/gen/go/v1;singletonV1";

enum ErrorReason {
  option (errors.default_code) = 500;

  ERROR_REASON_UNSPECIFIED = 0 [(errors.code) = 500];

  ERROR_REASON_ENT_NOT_FOUND = 1 [(errors.code) = 404];
  ERROR_REASON_ENT_VALIDATION = 2 [(errors.code) = 400];
  ERROR_REASON_ENT_NOT_SINGULAR = 3 [(errors.code) = 400];
  ERROR_REASON_ENT_NOT_LOADED = 4 [(errors.code) = 500];
  ERROR_REASON_ENT_CONSTRAINT = 5 [(errors.code) = 409];

  ERROR_REASON_RATELIMIT = 6 [(errors.code) = 429];
  ERROR_REASON_CIRCUITBREAKER = 7 [(errors.code) = 503];

  ERROR_REASON_VALIDATOR = 10 [(errors.code) = 400];
  ERROR_REASON_PAGINATION_INVALID_ARGUMENT = 11 [(errors.code) = 400];
  ERROR_REASON_UNAUTHORIZED = 12 [(errors.code) = 401];
  ERROR_REASON_FORBIDDEN = 13 [(errors.code) = 403];
  ERROR_REASON_PERMISSION_DENIED = 14 [(errors.code) = 403];
  ERROR_REASON_SESSION_REVOKED = 15 [(errors.code) = 401];
  ERROR_REASON_INVALID_ARGUMENT = 16 [(errors.code) = 400];

  // Biz domain errors
  ERROR_REASON_PASSWORD_WRONG = 20 [(errors.code) = 400];
  ERROR_REASON_EMAIL_ALREADY_EXISTS = 21 [(errors.code) = 409];
  ERROR_REASON_DEPARTMENT_HAS_CHILDREN = 22 [(errors.code) = 409];
  ERROR_REASON_DEPARTMENT_MOVE_TO_SELF = 23 [(errors.code) = 400];
  ERROR_REASON_DEPARTMENT_MOVE_TO_DESCENDANT = 24 [(errors.code) = 400];
}
