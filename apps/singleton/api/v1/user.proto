syntax = "proto3";

// buf:lint:ignore PACKAGE_DIRECTORY_MATCH
package api.singleton.v1;

import "auth/auth.proto";
import "buf/validate/validate.proto";
import "common/page.proto";
import "desc/desc.proto";
import "google/api/annotations.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/wrappers.proto";

option go_package = "cyber-ecosystem/apps/singleton/gen/go/v1;singletonV1";

// UserService
service UserService {
  option (desc.service_comment) = "用户服务";

  // CreateUser
  rpc CreateUser(CreateUserRequest) returns (CreateUserResponse) {
    option (desc.method_comment) = "新增用户";
    option (google.api.http) = {
      post: "/api/v1/user"
      body: "*"
    };
  }
  // UpdateUser
  rpc UpdateUser(UpdateUserRequest) returns (UpdateUserResponse) {
    option (desc.method_comment) = "修改用户";
    option (google.api.http) = {
      put: "/api/v1/user/{id}"
      body: "*"
    };
  }
  // DeleteUser
  rpc DeleteUser(DeleteUserRequest) returns (DeleteUserResponse) {
    option (desc.method_comment) = "删除用户";
    option (google.api.http) = {delete: "/api/v1/user/{id}"};
  }
  // GetUser
  rpc GetUser(GetUserRequest) returns (GetUserResponse) {
    option (desc.method_comment) = "查询用户详情";
    option (google.api.http) = {get: "/api/v1/user/{id}"};
  }
  // QueryUser
  rpc QueryUser(QueryUserRequest) returns (QueryUserResponse) {
    option (desc.method_comment) = "查询用户列表";
    option (google.api.http) = {get: "/api/v1/user"};
  }
}

message CreateUserRequest {
  optional string password = 1 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.min_len = 6
  ];
  optional string confirm = 2;
  optional string email = 3 [
    (buf.validate.field).required = true,
    (buf.validate.field).string.pattern = "^[^@]+@[^@]+\\.[^@]+$"
  ];

  option (buf.validate.message).cel = {
    id: "CreateUserRequest.password-confirm"
    message: "password and confirm are not the same"
    expression: "this.password == this.confirm"
  };
}

message CreateUserResponse {}

message UpdateUserRequest {
  string id = 1 [(buf.validate.field).string.len = 20];
  optional string password = 2 [(buf.validate.field).string.min_len = 6];
  optional string confirm = 3;
  repeated string fields_mask = 100 [(buf.validate.field).repeated = {
    min_items: 1
    unique: true
  }];

  option (buf.validate.message).cel = {
    id: "UpdateUserRequest.password-confirm"
    message: "password and confirm are not the same"
    expression: "this.password == this.confirm"
  };
}

message UpdateUserResponse {}

message DeleteUserRequest {
  string id = 1 [(buf.validate.field).string.len = 20];
}

message DeleteUserResponse {}

message GetUserRequest {
  string id = 1 [(buf.validate.field).string.len = 20];
}

message GetUserResponse {
  string id = 1;
  google.protobuf.Timestamp created_at = 2;
  google.protobuf.Timestamp updated_at = 3;
  google.protobuf.StringValue email = 4;
}

message QueryUserRequest {
  common.PageRequest page = 1;
  optional string id = 2;
  optional string email = 3;

  repeated string order_by = 100 [(buf.validate.field).cel = {
    id: "QueryUserRequest.order_by"
    message: ""
    expression: "this.all(item, size(item) == 0 || item.matches('^(created_at|updated_at):(asc|desc)$'))"
  }];
}

message QueryUserResponse {
  common.PageResponse page = 1;
  repeated GetUserResponse list = 2;
}
