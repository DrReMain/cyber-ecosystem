# Message i18n Schema (SSOT)
#
# Generates messages/{locale}.json, keeping all locales in sync.
#
# Structure:
#   Nested keys are flattened with _ → home.edit_to_start → home_edit_to_start
#   Leaf value = field description (the key itself is the field name)
#
# ==================== Paraglide Message Value Rules ====================
#
# 1. Plain text: "Hello World"
# 2. Interpolation: "Hello {name}, you have {count} items"
# 3. Plural (Intl.PluralRules):
#    [{
#      "declarations": ["input count", "local p = count: plural"],
#      "selectors": ["p"],
#      "match": { "p=one": "1 item", "p=other": "{count} items" }
#    }]
# 4. Custom select (gender, platform, etc.):
#    [{
#      "match": {
#        "gender=male": "Mr. {name}",
#        "gender=female": "Ms. {name}",
#        "gender=*": "{name}"
#      }
#    }]
# 5. Ordinal (1st, 2nd, 3rd):
#    [{
#      "declarations": ["input n", "local o = n: plural type=ordinal"],
#      "selectors": ["o"],
#      "match": { "o=one": "{n}st", "o=two": "{n}nd", "o=few": "{n}rd", "o=*": "{n}th" }
#    }]
# 6. Number/DateTime formatting:
#    [{
#      "declarations": ["input amount", "local f = amount: number style=currency currency=USD"],
#      "match": { "f=*": "Total: {f}" }
#    }]
#
# Note: Plural match keys vary by locale (English: one/other, Russian: one/few/many/other, Japanese: other).
#       Ordinal keys follow the same rule. Use Intl.PluralRules categories for each locale.

# ==================== 应用全局
app:
  title: 应用标题（所有语言相同）
locale:
  name: 语言显示名称，使用 select match {locale}
error:
  not_found_subtitle: 404 页面副标题
  error_subtitle: 500 页面副标题
  back_home: 返回首页按钮文本
  retry: 重试按钮文本
pending:
  subtitle: 加载中提示文本
filter:
  search: 查询按钮文本
  reset: 重置按钮文本
  fold: 收起按钮文本
  expand: 展开按钮文本
column:
  created_at: 创建时间列标题
  updated_at: 修改时间列标题
  action: 操作列标题
toolbar:
  refresh: 刷新按钮 Tooltip
  density: 密度按钮 Tooltip
  density_large: 宽松密度选项
  density_middle: 默认密度选项
  density_small: 紧凑密度选项

