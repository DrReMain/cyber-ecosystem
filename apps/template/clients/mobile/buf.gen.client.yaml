version: v2

plugins:
  - local: ./node_modules/.bin/protoc-gen-es
    out: apps/template/clients/mobile/src/services/connect
    opt:
      - target=ts

  - local: ./node_modules/.bin/protoc-gen-connect-es
    out: apps/template/clients/mobile/src/services/connect
    opt:
      - target=ts

  - local: ./node_modules/.bin/protoc-gen-connect-query
    out: apps/template/clients/mobile/src/services/connect
    opt:
      - target=ts
